apiVersion: apps/v1
kind: Deployment
metadata:
  name: ur-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ur-monitor
  template:
    metadata:
      labels:
        app: ur-monitor
    spec:
      containers:
        - name: ur-monitor
          image: ur-monitor:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: urmonitor
            - name: DB_USER
              value: urmonitor
            - name: DB_PASSWORD
              value: urmonitor
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
