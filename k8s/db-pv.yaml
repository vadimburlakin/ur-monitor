apiVersion: v1
kind: PersistentVolume
metadata:
  name: ur-monitor-postgres-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: ur-monitor
    name: postgres-data
  nfs:
    server: <NAS_IP>
    path: /volume1/k8s/ur-monitor/postgres
